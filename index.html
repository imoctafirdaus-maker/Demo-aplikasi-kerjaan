<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Modern 3D - Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --red: #ff4757; --blue: #1e90ff; --green: #2ed573; --yellow: #ffa502;
            --bg: #2f3542;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        #game-header {
            margin: 10px;
            text-align: center;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .player-card {
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0.4;
            transition: 0.3s;
        }

        .player-card.active {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        #ludo-board {
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            border: 8px solid #333;
            position: relative;
        }

        /* Styling dasar kotak papan */
        .cell { border: 0.1px solid #ddd; position: relative; }
        .red { background-color: var(--red); }
        .blue { background-color: var(--blue); }
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }

        /* Area Kontrol Dadu */
        #controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #dice-canvas {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #eee; transform: translateY(-3px); }
        button:disabled { background: #777; cursor: not-allowed; }

        /* Bidak/Tokens */
        .token {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div id="game-header">
        <h2>LUDO WEB 3D</h2>
        <div class="status-bar">
            <div id="p1-card" class="player-card active" style="background: var(--red);">P1</div>
            <div id="p2-card" class="player-card" style="background: var(--blue);">P2</div>
            <div id="p3-card" class="player-card" style="background: var(--green);">P3</div>
            <div id="p4-card" class="player-card" style="background: var(--yellow);">P4</div>
        </div>
    </div>

    <div id="ludo-board">
        </div>

    <div id="controls">
        <div id="dice-canvas"></div>
        <button id="roll-btn">ROLL!</button>
        <h1 id="dice-value">?</h1>
    </div>

    <script>
        /** * Bagian 1: Logika Game & UI Papan 
         */
        const board = document.getElementById('ludo-board');
        let currentPlayer = 1;
        let lastRoll = 0;
        let canRoll = true;

        // Inisialisasi Papan (Sederhana)
        function createBoard() {
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                // Logika pewarnaan dasar (Visual saja)
                let row = Math.floor(i / 15);
                let col = i % 15;
                
                if (row < 6 && col < 6) cell.classList.add('red');
                else if (row < 6 && col > 8) cell.classList.add('blue');
                else if (row > 8 && col < 6) cell.classList.add('green');
                else if (row > 8 && col > 8) cell.classList.add('yellow');
                
                board.appendChild(cell);
            }
        }

        /** * Bagian 2: Three.js 3D Dice 
         */
        let scene, camera, renderer, dice;

        function init3DDice() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(100, 100);
            document.getElementById('dice-canvas').appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(2, 2, 2);
            
            // Membuat texture angka dadu sederhana dengan Canvas
            const materials = [];
            for (let i = 1; i <= 6; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0,0,64,64);
                ctx.fillStyle = 'black';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(i, 32, 45);
                const texture = new THREE.CanvasTexture(canvas);
                materials.push(new THREE.MeshStandardMaterial({ map: texture }));
            }

            dice = new THREE.Mesh(geometry, materials);
            scene.add(dice);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(2, 2, 5).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function rollDiceAnimation(value) {
            canRoll = false;
            const btn = document.getElementById('roll-btn');
            btn.disabled = true;

            let rotations = {
                1: { x: 0, y: 0 },
                2: { x: 0, y: Math.PI / 2 },
                3: { x: Math.PI / 2, y: 0 },
                4: { x: -Math.PI / 2, y: 0 },
                5: { x: 0, y: -Math.PI / 2 },
                6: { x: Math.PI, y: 0 }
            };

            const target = rotations[value];
            const startTime = Date.now();
            const duration = 1000;

            function update() {
                const now = Date.now();
                const t = Math.min(1, (now - startTime) / duration);
                
                dice.rotation.x = t * (Math.PI * 8) + target.x;
                dice.rotation.y = t * (Math.PI * 8) + target.y;

                if (t < 1) requestAnimationFrame(update);
                else {
                    document.getElementById('dice-value').innerText = value;
                    finishTurn();
                }
            }
            update();
        }

        /** * Bagian 3: Alur Permainan 
         */
        document.getElementById('roll-btn').onclick = () => {
            if (!canRoll) return;
            const result = Math.floor(Math.random() * 6) + 1;
            lastRoll = result;
            rollDiceAnimation(result);
        };

        function finishTurn() {
            // Logika sederhana pindah giliran
            setTimeout(() => {
                document.getElementById(`p${currentPlayer}-card`).classList.remove('active');
                currentPlayer = (currentPlayer % 4) + 1;
                document.getElementById(`p${currentPlayer}-card`).classList.add('active');
                
                canRoll = true;
                document.getElementById('roll-btn').disabled = false;
                document.getElementById('dice-value').innerText = "?";
            }, 1000);
        }

        // Jalankan Inisialisasi
        createBoard();
        init3DDice();

    </script>
</body>
</html>
