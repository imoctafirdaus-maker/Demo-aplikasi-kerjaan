<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Mobile Lite</title>
    <style>
        :root {
            --red: #e74c3c;
            --blue: #3498db;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --white: #ecf0f1;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        #game-info {
            margin-bottom: 10px;
            text-align: center;
        }

        /* Ludo Board Layout */
        #ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 95vw;
            max-width: 450px;
            aspect-ratio: 1/1;
            background-color: white;
            border: 5px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Warna Area Rumah (Home) */
        .red-area { background-color: var(--red); }
        .blue-area { background-color: var(--blue); }
        .green-area { background-color: var(--green); }
        .yellow-area { background-color: var(--yellow); }

        .center-area {
            grid-column: 7 / 10;
            grid-row: 7 / 10;
            background: conic-gradient(var(--red) 0% 25%, var(--blue) 25% 50%, var(--yellow) 50% 75%, var(--green) 75% 100%);
        }

        /* Bidak */
        .pawn {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .pawn-red { background-color: var(--red); }
        .pawn-blue { background-color: var(--blue); }

        /* UI Kontrol */
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #dice {
            width: 60px;
            height: 60px;
            background: white;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            border-bottom: 5px solid #bdc3c7;
        }

        #dice.rolling {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0eg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .status-text {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="game-info">
        <div class="status-text" id="turn-indicator">Giliran: <span style="color:var(--red)">MERAH</span></div>
    </div>

    <div id="ludo-board">
        </div>

    <div class="controls">
        <div id="dice" onclick="rollDice()">1</div>
        <div>
            <div id="msg">Klik dadu!</div>
        </div>
    </div>

    <script>
        const board = document.getElementById('ludo-board');
        const diceElement = document.getElementById('dice');
        const msgElement = document.getElementById('msg');
        let currentTurn = 'red';
        let diceValue = 1;
        let isRolling = false;

        // Inisialisasi Papan (Sederhana)
        function initBoard() {
            board.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                const r = Math.floor(i / 15);
                const c = i % 15;

                // Logika pewarnaan area rumah
                if (r < 6 && c < 6) cell.classList.add('red-area');
                else if (r < 6 && c > 8) cell.classList.add('green-area');
                else if (r > 8 && c < 6) cell.classList.add('blue-area');
                else if (r > 8 && c > 8) cell.classList.add('yellow-area');
                else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
                    if (i === 112) cell.className = 'center-area';
                }

                // Tambahkan Bidak Contoh
                if (i === 32) cell.innerHTML = '<div class="pawn pawn-red" onclick="movePawn(\'red\')"></div>';
                if (i === 192) cell.innerHTML = '<div class="pawn pawn-blue" onclick="movePawn(\'blue\')"></div>';

                board.appendChild(cell);
            }
        }

        function rollDice() {
            if (isRolling) return;
            
            isRolling = true;
            diceElement.classList.add('rolling');
            msgElement.innerText = "Memutar...";

            setTimeout(() => {
                diceValue = Math.floor(Math.random() * 6) + 1;
                diceElement.innerText = diceValue;
                diceElement.classList.remove('rolling');
                isRolling = false;
                msgElement.innerText = "Gerakkan bidak!";
                
                // Jika dapat 6, biasanya boleh main lagi (Logika dasar)
                if (diceValue !== 6) {
                    // switchTurn(); // Aktifkan ini untuk sistem giliran otomatis
                }
            }, 600);
        }

        function movePawn(color) {
            if (isRolling) return;
            alert(`${color.toUpperCase()} maju ${diceValue} langkah!`);
            switchTurn();
        }

        function switchTurn() {
            currentTurn = (currentTurn === 'red') ? 'blue' : 'red';
            const colorHex = currentTurn === 'red' ? 'var(--red)' : 'var(--blue)';
            document.getElementById('turn-indicator').innerHTML = `Giliran: <span style="color:${colorHex}">${currentTurn.toUpperCase()}</span>`;
            msgElement.innerText = "Klik dadu!";
        }

        initBoard();
    </script>
</body>
</html>
