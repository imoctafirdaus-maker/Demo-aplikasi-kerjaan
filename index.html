<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Mobile Single File</title>
    <style>
        /* CSS: Tampilan & Responsivitas */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #status {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 5px solid #34495e;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem; /* Ukuran bidak */
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .white-sq { background-color: #eeeed2; color: #333; }
        .black-sq { background-color: #769656; color: #333; }

        .selected { 
            background-color: #f7f769 !important; 
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:active {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="status">Giliran: Putih</div>
    <div id="board"></div>
    <button onclick="resetGame()">Reset Game</button>

    <script>
        /* JAVASCRIPT: Logika Permainan */
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let selectedSquare = null;
        let turn = 'white';

        // Representasi Papan (Unicode Bidak Catur)
        let boardState = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = `square ${(row + col) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    
                    // Highlight jika kotak ini sedang dipilih
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                        square.classList.add('selected');
                    }

                    square.innerText = boardState[row][col];
                    square.onclick = () => handleSquareClick(row, col);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(row, col) {
            const piece = boardState[row][col];

            if (selectedSquare) {
                // Jika klik kotak yang sama, batalkan pilihan
                if (selectedSquare.row === row && selectedSquare.col === col) {
                    selectedSquare = null;
                } else {
                    // Eksekusi Pindah (Logika Bebas/Tanpa Aturan ketat)
                    movePiece(selectedSquare.row, selectedSquare.col, row, col);
                    selectedSquare = null;
                }
            } else {
                // Pilih bidak jika tidak kosong
                if (piece !== '') {
                    selectedSquare = { row, col };
                }
            }
            createBoard();
        }

        function movePiece(fromRow, fromCol, toRow, toCol) {
            boardState[toRow][toCol] = boardState[fromRow][fromCol];
            boardState[fromRow][fromCol] = '';
            
            // Ganti Giliran
            turn = (turn === 'white') ? 'black' : 'white';
            statusElement.innerText = `Giliran: ${turn === 'white' ? 'Putih' : 'Hitam'}`;
        }

        function resetGame() {
            if(confirm("Ulangi permainan?")) {
                location.reload();
            }
        }

        // Inisialisasi awal
        createBoard();
    </script>
</body>
</html>
