<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Board Classic</title>
    <style>
        :root {
            --red: #e41e26;
            --green: #00a651;
            --yellow: #fff200;
            --blue: #2e3192;
            --white: #ffffff;
            --border: #222;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        /* Container Papan */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 95vw;
            max-width: 500px;
            aspect-ratio: 1/1;
            background-color: var(--white);
            border: 4px solid var(--border);
            position: relative;
        }

        /* Dasar Sel */
        .cell {
            border: 0.5px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            font-size: 1.2rem;
        }

        /* Area Rumah (Besar) */
        .home {
            grid-column: span 6;
            grid-row: span 6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .home-inner {
            width: 80%;
            height: 80%;
            background: white;
            border: 2px solid #333;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            padding: 10px;
        }

        .base-pawn {
            border-radius: 50%;
            border: 2px solid #333;
        }

        /* Pewarnaan Area */
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }
        .red { background-color: var(--red); }
        .blue { background-color: var(--blue); }

        /* Area Tengah (Segitiga) */
        .center-home {
            grid-column: 7 / 10;
            grid-row: 7 / 10;
            position: relative;
            border: 1px solid var(--border);
            background: 
                linear-gradient(to bottom right, var(--green) 50%, transparent 50.5%),
                linear-gradient(to bottom left, var(--yellow) 50%, transparent 50.5%),
                linear-gradient(to top right, var(--red) 50%, transparent 50.5%),
                linear-gradient(to top left, var(--blue) 50%, transparent 50.5%);
        }

        /* Simbol Bintang & Panah */
        .star::after { content: '☆'; font-weight: bold; color: #333; }
        .arrow-up::after { content: '↑'; color: var(--red); font-weight: bold; }
        .arrow-down::after { content: '↓'; color: var(--yellow); font-weight: bold; }
        .arrow-left::after { content: '←'; color: var(--green); font-weight: bold; }
        .arrow-right::after { content: '→'; color: var(--blue); font-weight: bold; }

    </style>
</head>
<body>

<div class="ludo-board" id="board">
    <div class="home green" style="grid-area: 1 / 1 / 7 / 7;">
        <div class="home-inner">
            <div class="base-pawn green"></div>
            <div class="base-pawn green"></div>
            <div class="base-pawn green"></div>
            <div class="base-pawn green"></div>
        </div>
    </div>

    <div class="home yellow" style="grid-area: 1 / 10 / 7 / 16;">
        <div class="home-inner">
            <div class="base-pawn yellow"></div>
            <div class="base-pawn yellow"></div>
            <div class="base-pawn yellow"></div>
            <div class="base-pawn yellow"></div>
        </div>
    </div>

    <div class="home red" style="grid-area: 10 / 1 / 16 / 7;">
        <div class="home-inner">
            <div class="base-pawn red"></div>
            <div class="base-pawn red"></div>
            <div class="base-pawn red"></div>
            <div class="base-pawn red"></div>
        </div>
    </div>

    <div class="home blue" style="grid-area: 10 / 10 / 16 / 16;">
        <div class="home-inner">
            <div class="base-pawn blue"></div>
            <div class="base-pawn blue"></div>
            <div class="base-pawn blue"></div>
            <div class="base-pawn blue"></div>
        </div>
    </div>

    <div class="center-home"></div>

    </div>

<script>
    const board = document.getElementById('board');

    // Fungsi untuk membuat sel di posisi spesifik
    function createCell(row, col, className = "") {
        const cell = document.createElement('div');
        cell.className = 'cell ' + className;
        cell.style.gridRow = row;
        cell.style.gridColumn = col;
        board.appendChild(cell);
        return cell;
    }

    // Generate Lintasan (Horizontal & Vertical Paths)
    for (let r = 1; r <= 15; r++) {
        for (let c = 1; c <= 15; c++) {
            // Hanya buat sel jika bukan area Home atau Center
            if (
                ((r > 6 && r < 10) || (c > 6 && c < 10)) && 
                !(r > 6 && r < 10 && c > 6 && c < 10)
            ) {
                let extraClass = "";
                
                // Jalur Masuk (Home Stretch)
                if (r === 8 && c > 1 && c < 7) extraClass = "green";
                if (r === 8 && c > 9 && c < 15) extraClass = "blue";
                if (c === 8 && r > 1 && r < 7) extraClass = "yellow";
                if (c === 8 && r > 9 && r < 15) extraClass = "red";

                // Titik Start
                if (r === 7 && c === 2) extraClass = "green";
                if (r === 9 && c === 14) extraClass = "blue";
                if (r === 2 && c === 9) extraClass = "yellow";
                if (r === 14 && c === 7) extraClass = "red";

                // Bintang & Panah (Sesuai Gambar)
                const cell = createCell(r, c, extraClass);
                
                if (r === 9 && c === 3) cell.classList.add('star');
                if (r === 3 && c === 7) cell.classList.add('star');
                if (r === 7 && c === 13) cell.classList.add('star');
                if (r === 13 && c === 9) cell.classList.add('star');

                if (r === 15 && c === 8) cell.classList.add('arrow-up');
                if (r === 1 && c === 8) cell.classList.add('arrow-down');
                if (r === 8 && c === 1) cell.classList.add('arrow-left');
                if (r === 8 && c === 15) cell.classList.add('arrow-right');
            }
        }
    }
</script>

</body>
</html>
